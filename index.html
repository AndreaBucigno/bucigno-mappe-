<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="styles.css">k
</head>
<body>
<div class="container">
  <div class="toolbar">
    <!-- Nominatim search by name -->
    <div>
      <label>Cerca luogo</label>
      <input type="text" id="query" placeholder="es. Roma, Torre Eiffel…">
    </div>
    <button onclick="searchPlace()">Cerca</button>

    <div class="sep"></div>

    <!-- Direct coords -->
    <div>
      <label>Latitudine</label>
      <input type="number" id="lat" placeholder="41.9028" step="0.0001">
    </div>
    <div>
      <label>Longitudine</label>
      <input type="number" id="lon" placeholder="12.4964" step="0.0001">
    </div>
    <button onclick="goTo()">Vai</button>
  </div>

  <div id="status">Cerca un luogo oppure inserisci le coordinate.</div>
  <div id="map"></div>
</div>

<script>
  const map = L.map('map').setView([41.9028, 12.4964], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  let marker = null;

  function placeMarker(lat, lon, label) {
    if (marker) marker.remove();
    marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
  }
  

  async function searchPlace() {
    const q = document.getElementById('query').value.trim();
    if (!q) return;
    document.getElementById('status').textContent = 'Ricerca in corso…';
    try {
      const res = await fetch(
        'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=1',
        { headers: { 'Accept-Language': 'it,en' } }
      );
      const data = await res.json();
      if (!data.length) {
        document.getElementById('status').textContent = 'Nessun risultato per "' + q + '".';
        return;
      }
      const { lat, lon, display_name } = data[0];
      document.getElementById('lat').value = parseFloat(lat).toFixed(5);
      document.getElementById('lon').value = parseFloat(lon).toFixed(5);
      map.setView([lat, lon], 13);
      placeMarker(lat, lon, display_name);
      document.getElementById('status').textContent = display_name;
    } catch(e) {
      document.getElementById('status').textContent = 'Errore nella ricerca.';
    }
  }

  function goTo() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lon = parseFloat(document.getElementById('lon').value);
    if (isNaN(lat) || isNaN(lon)) { document.getElementById('status').textContent = 'Coordinate non valide.'; return; }
    map.setView([lat, lon], 13);
    placeMarker(lat, lon, lat.toFixed(5) + ', ' + lon.toFixed(5));
    document.getElementById('status').textContent = 'Posizione: ' + lat.toFixed(5) + ', ' + lon.toFixed(5);
  }

  document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') searchPlace(); });
  document.getElementById('lon').addEventListener('keydown',   e => { if (e.key === 'Enter') goTo(); });
  document.getElementById('lat').addEventListener('keydown',   e => { if (e.key === 'Enter') goTo(); });
</script>
</body>
</html>
